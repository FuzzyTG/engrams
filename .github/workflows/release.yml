name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run check

      - run: npm run package:openclaw

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/engrams-openclaw-v*.tar.gz
